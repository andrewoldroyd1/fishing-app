<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utah Fishing Report</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #0a1628; color: #fff; padding: 20px; max-width: 600px; margin: 0 auto; }
        .header { text-align: center; padding: 30px 0; }
        .header h1 { font-size: 28px; color: #4fc3f7; }
        .header p { color: #888; margin-top: 5px; }
        .best { background: #1a3a5c; border-left: 4px solid #4fc3f7; padding: 15px; border-radius: 8px; margin: 20px 0; font-size: 18px; }
        .card { background: #1a2744; border-radius: 12px; padding: 15px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: background 0.2s; }
        .card:hover { background: #243560; }
        .card-left h3 { font-size: 16px; margin-bottom: 4px; }
        .card-left p { font-size: 13px; color: #888; }
        .score { font-size: 28px; font-weight: bold; }
        .score.green { color: #4caf50; }
        .score.yellow { color: #ffc107; }
        .score.red { color: #f44336; }
        .section { background: #1a2744; border-radius: 12px; padding: 20px; margin: 15px 0; }
        .section h2 { font-size: 16px; color: #4fc3f7; margin-bottom: 15px; }
        .stat { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #2a3754; font-size: 14px; }
        .stat:last-child { border-bottom: none; }
        .stat-label { color: #888; }
        .fly { padding: 6px 0; font-size: 14px; border-bottom: 1px solid #2a3754; }
        .fly:last-child { border-bottom: none; }
        .footer { text-align: center; color: #555; padding: 20px 0; font-size: 12px; }

        /* Detail view */
        .detail-view { display: none; }
        .detail-view.active { display: block; }
        .list-view { display: block; }
        .list-view.hidden { display: none; }
        .back-btn { background: #1a3a5c; border: none; color: #4fc3f7; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; margin-bottom: 20px; }
        .back-btn:hover { background: #243560; }
        .detail-header { background: #1a2744; border-radius: 12px; padding: 20px; margin-bottom: 15px; text-align: center; }
        .detail-header h2 { font-size: 24px; margin-bottom: 10px; }
        .big-score { font-size: 56px; font-weight: bold; }
        .big-score.green { color: #4caf50; }
        .big-score.yellow { color: #ffc107; }
        .big-score.red { color: #f44336; }
    </style>
</head>
<body>

    <!-- LIST VIEW -->
    <div class="list-view" id="list-view">
        <div class="header">
            <h1>🎣 Utah Fishing Report</h1>
            <p id="report-time">Loading...</p>
        </div>
        <div class="best" id="best-river">Loading...</div>
        <div id="rivers"></div>
        <div class="section">
            <h2>🪰 FLIES TO USE</h2>
            <div id="flies"></div>
        </div>
        <div class="footer">Tap a river for details • Updated daily at 7:00 AM</div>
    </div>

    <!-- DETAIL VIEW -->
    <div class="detail-view" id="detail-view">
        <button class="back-btn" onclick="showList()">← Back to all rivers</button>
        <div class="detail-header">
            <h2 id="detail-name">-</h2>
            <div class="big-score" id="detail-score">-</div>
            <p id="detail-verdict" style="color:#888; margin-top:5px;">-</p>
        </div>
        <div class="section">
            <h2>🌊 RIVER CONDITIONS</h2>
            <div class="stat"><span class="stat-label">Flow</span><span id="detail-flow">-</span></div>
            <div class="stat"><span class="stat-label">Trend</span><span id="detail-trend">-</span></div>
            <div class="stat"><span class="stat-label">Conditions</span><span id="detail-condition">-</span></div>
            <div class="stat"><span class="stat-label">Water Temp</span><span id="detail-temp">-</span></div>
        </div>
        <div class="section">
            <h2>☁️ LOCAL WEATHER</h2>
            <div id="detail-weather"></div>
            <div class="stat" style="margin-top:10px;"><span class="stat-label">Note</span><span id="detail-weather-note">-</span></div>
        </div>
        <div class="section">
            <h2>⏰ TIMING</h2>
            <div class="stat"><span class="stat-label">Sunrise</span><span id="detail-sunrise">-</span></div>
            <div class="stat"><span class="stat-label">Sunset</span><span id="detail-sunset">-</span></div>
            <div class="stat"><span class="stat-label">Best Window</span><span id="detail-window">-</span></div>
        </div>
        <div class="section">
            <h2>🪰 FLIES TO USE</h2>
            <div id="detail-flies"></div>
        </div>
    </div>

    <script>
        let reportData = null

        function showList() {
            document.getElementById('list-view').classList.remove('hidden')
            document.getElementById('detail-view').classList.remove('active')
        }

        function showDetail(index) {
            const r = reportData.rivers[index]
            document.getElementById('list-view').classList.add('hidden')
            document.getElementById('detail-view').classList.add('active')

            document.getElementById('detail-name').textContent = r.name
            document.getElementById('detail-score').textContent = r.score + '/10'
            document.getElementById('detail-score').className = 'big-score ' + r.color
            document.getElementById('detail-verdict').textContent = r.verdict
            document.getElementById('detail-flow').textContent = r.flow ? r.flow + ' CFS' : 'No data'
            document.getElementById('detail-trend').textContent = r.trend_emoji
            document.getElementById('detail-condition').textContent = r.condition
            document.getElementById('detail-temp').textContent = r.temp
            document.getElementById('detail-weather-note').textContent = r.weather_note

            document.getElementById('detail-weather').innerHTML = r.weather.map(w => `
                <div class="stat">
                    <span class="stat-label">${w.day}</span>
                    <span>${w.high}°F / ${w.low}°F</span>
                    <span>${w.wind} mph</span>
                    <span>${w.rain}</span>
                </div>
            `).join('')

            document.getElementById('detail-sunrise').textContent = reportData.sunrise
            document.getElementById('detail-sunset').textContent = reportData.sunset
            document.getElementById('detail-window').textContent = reportData.best_window

            document.getElementById('detail-flies').innerHTML = reportData.flies.map(f =>
                `<div class="fly">${f}</div>`
            ).join('')
        }

        fetch('data.json')
            .then(r => r.json())
            .then(d => {
                reportData = d
                document.getElementById('report-time').textContent = d.report_time
                document.getElementById('best-river').textContent = '👉 Best river today: ' + d.best_river

                document.getElementById('rivers').innerHTML = d.rivers.map((r, i) => `
                    <div class="card" onclick="showDetail(${i})">
                        <div class="card-left">
                            <h3>${r.name}</h3>
                            <p>${r.flow ? r.flow + ' CFS' : 'No data'} | ${r.trend} | ${r.condition}</p>
                        </div>
                        <div class="score ${r.color}">${r.score}/10</div>
                    </div>
                `).join('')

                document.getElementById('flies').innerHTML = d.flies.map(f =>
                    `<div class="fly">${f}</div>`
                ).join('')
            })
    </script>
</body>
</html>
